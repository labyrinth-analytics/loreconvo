<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <!-- LoreConvo: Gothic speech scroll with runic text -->
  <!-- Background: dark stone rounded square -->
  <rect width="128" height="128" rx="24" fill="#1a1028"/>
  <rect width="128" height="128" rx="24" fill="none" stroke="#7b2d8e" stroke-width="1.5" opacity="0.6"/>

  <!-- Scroll/speech element -->
  <path d="M34 30 C34 26 37 24 40 24 L88 24 C91 24 94 26 94 30 L94 82 C94 86 91 88 88 88 L58 88 L46 98 L46 88 L40 88 C37 88 34 86 34 82 Z" fill="#2a1a3e" stroke="#c9a84c" stroke-width="1"/>

  <!-- Runic text lines (gold) -->
  <line x1="44" y1="38" x2="72" y2="38" stroke="#c9a84c" stroke-width="2" stroke-linecap="round"/>
  <line x1="44" y1="48" x2="82" y2="48" stroke="#c9a84c" stroke-width="2" stroke-linecap="round" opacity="0.7"/>
  <line x1="44" y1="58" x2="76" y2="58" stroke="#c9a84c" stroke-width="2" stroke-linecap="round" opacity="0.5"/>
  <line x1="44" y1="68" x2="68" y2="68" stroke="#c9a84c" stroke-width="2" stroke-linecap="round" opacity="0.35"/>

  <!-- Corner rune flourishes -->
  <path d="M28 20 L28 28 M24 24 L32 24" stroke="#9b4dae" stroke-width="1.5" stroke-linecap="round" opacity="0.8"/>
  <path d="M100 20 L100 28 M96 24 L104 24" stroke="#9b4dae" stroke-width="1.5" stroke-linecap="round" opacity="0.8"/>
  <path d="M28 100 L28 108 M24 104 L32 104" stroke="#9b4dae" stroke-width="1.5" stroke-linecap="round" opacity="0.8"/>
  <path d="M100 100 L100 108 M96 104 L104 104" stroke="#9b4dae" stroke-width="1.5" stroke-linecap="round" opacity="0.8"/>

  <!-- Glowing memory orb -->
  <circle cx="86" cy="36" r="4" fill="#c9a84c" opacity="0.9"/>
  <circle cx="86" cy="36" r="7" fill="#c9a84c" opacity="0.15"/>
</svg>
